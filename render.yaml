# One-click-ish deploy on Render: app + worker + Postgres.
# NOTE: Signal Scout needs pgvector. Render managed Postgres supports it; if your
# plan/region doesn't, point DATABASE_URL at Neon or Supabase instead (both have
# pgvector) and delete the `databases:` block below.
databases:
  - name: signalscout-db
    plan: starter
    postgresMajorVersion: '16'

services:
  - type: web
    name: signalscout-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: signalscout-db, property: connectionString }
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false # set to your app URL
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_GITHUB_ID
        sync: false
      - key: AUTH_GITHUB_SECRET
        sync: false
      - key: SEC_USER_AGENT
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

  - type: worker
    name: signalscout-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: signalscout-db, property: connectionString }
      - key: SEC_USER_AGENT
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SMTP_URL
        sync: false
